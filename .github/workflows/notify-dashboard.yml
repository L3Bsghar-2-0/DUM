name: build-push-notify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IDP_REPO: L3Bsghar-2-0/IDP

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install OCR/system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils libgl1 libglib2.0-0

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_lc: ${{ steps.meta.outputs.image_lc }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          SHORT=${GITHUB_SHA::7}
          echo "image_lc=${IMAGE_LC}"           >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT}"             >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ env.REGISTRY }}/${IMAGE_LC}:sha-${SHORT}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.extractor
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_lc }}:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_lc }}:sha-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-idp:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to IDP
        env:
          ORG_PAT: ${{ secrets.ORG_PAT }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}
          GIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -nc \
            --arg image     "$IMAGE_REF" \
            --arg sha       "$GIT_SHA" \
            --arg short_sha "$SHORT_SHA" \
            --arg actor     "$ACTOR" \
            --arg msg       "${COMMIT_MSG:-}" \
            '{event_type:"dum-updated", client_payload:{image:$image, sha:$sha, short_sha:$short_sha, actor:$actor, message:$msg}}')

          curl -sSfL -X POST \
            -H "Authorization: Bearer ${ORG_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ env.IDP_REPO }}/dispatches" \
            -d "$PAYLOAD"
