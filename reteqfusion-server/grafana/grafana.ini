[server]
http_port = 3000

[security]
admin_user = admin
allow_embedding = true

[users]
allow_sign_up = false

[auth.anonymous]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false

[log]
mode = console
level = info

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/iot_overview.json
